<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CAMA worship and mission abstract artwork</title>
  <desc id="desc">An abstract stage-like Christian arts mission scene with a cross-shaped light, golden ribbons, and connecting circles symbolizing worship, art, mission, and alliance.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#304463"/>
      <stop offset="46%" stop-color="#10213C"/>
      <stop offset="100%" stop-color="#071326"/>
    </radialGradient>
    <linearGradient id="gold" x1="177" y1="888" x2="1197" y2="206" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4E3B1" stop-opacity="0.9"/>
      <stop offset="0.44" stop-color="#CFA85A"/>
      <stop offset="1" stop-color="#FFF1BE" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="olive" x1="106" y1="786" x2="1071" y2="363" gradientUnits="userSpaceOnUse">
      <stop stop-color="#AFC7A1" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#6F8D76" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
